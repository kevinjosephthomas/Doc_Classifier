apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: doc-classifier-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kevinjosephthomas/Doc_Classifier.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
  revisionHistoryLimit: 10