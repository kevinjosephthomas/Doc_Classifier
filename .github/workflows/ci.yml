name: CI/CD Pipeline - Full Stack

on:
  push:
    branches:
      - main

jobs:

  # =========================
  # 🧪 BACKEND TESTS
  # =========================
  backend-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Backend Dependencies
      run: |
        pip install -r requirements.txt
        pip install -r backend/requirements.txt

    - name: Run Backend Unit Tests
      run: pytest tests/ -v


  # =========================
  # 🎨 FRONTEND BUILD
  # =========================
  frontend-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install

    - name: Build Frontend
      run: |
        cd frontend
        npm run build


  # =========================
  # 🚀 BUILD + SECURITY + PUSH
  # =========================
  build-and-push:
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 🐳 Docker setup
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # =========================
    # 🔐 INSTALL TRIVY
    # =========================
    - name: Install Trivy
      run: |
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.70.0_Linux-64bit.deb
        sudo dpkg -i trivy_0.70.0_Linux-64bit.deb

    # ⚡ Cache Trivy DB (faster builds)
    - name: Cache Trivy DB
      uses: actions/cache@v3
      with:
        path: ~/.cache/trivy
        key: trivy-cache

    # =========================
    # 🔍 SCAN SOURCE CODE
    # =========================
    - name: Scan Filesystem (Dependencies & Secrets)
      run: |
        trivy fs --exit-code 1 --severity CRITICAL .

    # =========================
    # 🐳 BUILD BACKEND IMAGE
    # =========================
    - name: Build Backend Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: false
        load: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/doc-classifier-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/doc-classifier-backend:${{ github.sha }}

    # 🔎 Scan backend image (LOCAL)
    - name: Scan Backend Image
      run: |
        trivy image --exit-code 1 --severity CRITICAL \
        docker://${{ secrets.DOCKER_USERNAME }}/doc-classifier-backend:latest

    # 🚀 Push backend image
    - name: Push Backend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/doc-classifier-backend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/doc-classifier-backend:${{ github.sha }}

    # =========================
    # 🐳 BUILD FRONTEND IMAGE
    # =========================
    - name: Build Frontend Image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: false
        load: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/doc-classifier-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/doc-classifier-frontend:${{ github.sha }}

    # 🔎 Scan frontend image
    - name: Scan Frontend Image
      run: |
        trivy image --exit-code 1 --severity CRITICAL \
        docker://${{ secrets.DOCKER_USERNAME }}/doc-classifier-frontend:latest

    # 🚀 Push frontend image
    - name: Push Frontend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/doc-classifier-frontend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/doc-classifier-frontend:${{ github.sha }}

    # =========================
    # ☸️ SCAN K8s MANIFESTS
    # =========================
    - name: Scan Kubernetes Manifests
      run: |
        trivy config --exit-code 1 --severity CRITICAL k8s/