name: CI/CD Pipeline - Full Stack

on:
  push:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Backend Dependencies
      run: pip install -r requirements.txt && pip install -r backend/requirements.txt

    - name: Run Backend Unit Tests
      run: pytest tests/ -v

  frontend-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Frontend Dependencies
      run: cd frontend && npm install

    - name: Build Frontend
      run: cd frontend && npm run build

  build-and-push:
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Backend Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: false
        load: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/doc-classifier-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/doc-classifier-backend:${{ github.sha }}

    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy

    - name: Scan Backend Image for Vulnerabilities
      run: |
        trivy image --exit-code 1 --no-progress --format table --severity HIGH,CRITICAL ${{ secrets.DOCKER_USERNAME }}/doc-classifier-backend:latest

    - name: Push Backend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/doc-classifier-backend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/doc-classifier-backend:${{ github.sha }}

    - name: Build and Push Frontend Image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: false
        load: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/doc-classifier-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/doc-classifier-frontend:${{ github.sha }}

    - name: Scan Frontend Image for Vulnerabilities
      run: |
        trivy image --exit-code 1 --no-progress --format table --severity HIGH,CRITICAL ${{ secrets.DOCKER_USERNAME }}/doc-classifier-frontend:latest

    - name: Push Frontend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/doc-classifier-frontend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/doc-classifier-frontend:${{ github.sha }}

    - name: Scan Kubernetes Manifests
      run: |
        trivy config --exit-code 1 --format table k8s/